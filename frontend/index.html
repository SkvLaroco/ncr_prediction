<!DOCTYPE html>
<html>
<head>
    <title>NCR SHS Forecast System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>NCR SHS Enrollment Forecast Dashboard</h1>

<div class="container">

    <!-- UPLOAD -->
    <div class="card">
        <h2>Upload Dataset</h2>

        <input type="file" id="file" accept=".csv">

        <button onclick="runForecast()">Run Forecast</button>

        <p><b>Required format:</b></p>
        <pre>
Year,Total_Enrollees
2020,300000
2021,320000
2022,330000
        </pre>
    </div>

    <!-- RESULT -->
    <div class="card">
        <h2>Forecast Result</h2>
        <div id="result">No results yet.</div>
    </div>

</div>

<!-- IMPORTANT: JS MUST BE AT BOTTOM -->
<script src="script.js"></script>

</body>
</html>
